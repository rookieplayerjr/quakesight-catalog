<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuakeSight — event catalog</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Widgets/widgets.css">
<script src="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Cesium.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1b4b73; --ink:#1b252f; --mut:#5c6b7a; --line:#d9dee4;
    --bg:#f4f6f8; --sel:#e7f0fb;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Source Sans 3',system-ui,-apple-system,Segoe UI,sans-serif;
       color:var(--ink);background:var(--bg);display:flex;flex-direction:column}
  /* ---- header ---- */
  header{background:#0f2a43;color:#fff;height:54px;flex:0 0 54px;
         display:flex;align-items:center;padding:0 18px;gap:14px}
  header .logo{font-weight:700;font-size:18px;letter-spacing:.2px}
  header .logo span{font-weight:400;opacity:.7}
  header .meta{font-size:12.5px;opacity:.78;margin-left:auto}
  header .tabs{display:flex;gap:0}
  header .tabs button{font-family:inherit;font-size:13px;font-weight:600;
       padding:7px 16px;border:1px solid #2c4d6e;background:#16395a;color:#cfe0f0;
       cursor:pointer}
  header .tabs button:first-child{border-radius:4px 0 0 4px}
  header .tabs button:last-child{border-radius:0 4px 4px 0;border-left:0}
  header .tabs button.on{background:#3a82c4;color:#fff;border-color:#3a82c4}
  /* ---- body split ---- */
  #body{flex:1;display:flex;min-height:0}
  #map{flex:1;height:100%}
  #globe{flex:1;height:100%;position:relative;background:#000}
  #globe .cesium-viewer-bottom{display:none}
  /* ---- sidebar list ---- */
  aside{flex:0 0 372px;background:#fff;border-left:1px solid var(--line);
        display:flex;flex-direction:column;min-height:0}
  .side-top{padding:10px 14px;border-bottom:1px solid var(--line)}
  .side-top input{width:100%;font-family:inherit;font-size:13.5px;padding:7px 10px;
        border:1px solid #c4ccd5;border-radius:5px}
  .side-top .legend{display:flex;flex-wrap:wrap;gap:9px;margin-top:8px;
        font-size:11.5px;color:var(--mut)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .side-count{font-size:12px;color:var(--mut);padding:6px 14px;
        border-bottom:1px solid var(--line);background:#fafbfc}
  #list{overflow-y:auto;flex:1}
  .item{display:flex;gap:11px;padding:10px 14px;border-bottom:1px solid #eef1f4;
        cursor:pointer;align-items:flex-start}
  .item:hover{background:#f0f4f8}
  .item.sel{background:var(--sel);box-shadow:inset 3px 0 0 var(--blue)}
  .badge{flex:0 0 42px;height:42px;border-radius:7px;display:flex;
        flex-direction:column;align-items:center;justify-content:center;
        color:#fff;font-weight:700;line-height:1}
  .badge .m{font-size:16px}
  .badge .ml{font-size:8.5px;font-weight:600;opacity:.85;margin-top:1px}
  .it-main{min-width:0;flex:1}
  .it-place{font-weight:600;font-size:13.5px}
  .it-sub{font-size:11.8px;color:var(--mut);margin-top:1px}
  .it-status{font-size:11.5px;font-weight:600;margin-top:3px;
        display:flex;align-items:center;gap:5px}
  .it-status .stale{color:#c0392b}
  /* ---- table ---- */
  #tablewrap{flex:1;overflow:auto;padding:0 20px 30px;background:#fff}
  table{border-collapse:collapse;font-size:13px;width:100%;margin-top:14px}
  th,td{border-bottom:1px solid #e3e7ec;padding:7px 11px;text-align:left}
  th{background:#0f2a43;color:#fff;cursor:pointer;position:sticky;top:0;
     font-weight:600;font-size:12.5px}
  th:hover{background:#1b4b73}
  tbody tr:hover{background:#f0f4f8}
  .pill{padding:2px 9px;border-radius:11px;font-size:11px;color:#fff;font-weight:600}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}
  .hidden{display:none}
  /* ---- leaflet popup ---- */
  .leaflet-popup-content{margin:11px 13px;font-size:12.5px;line-height:1.55}
  .pop .eid{font-size:14px;font-weight:700;color:var(--blue)}
  .pop .place{font-weight:600}
  .pop .time{color:var(--mut)}
  .pop hr{border:0;border-top:1px solid #e3e7ec;margin:6px 0}
  .pop .st{font-weight:700}
  .pop .stale{color:#c0392b;font-weight:600}
  .pop .esc{color:#b06000}
  .pop a{display:inline-block;margin-top:3px;font-weight:600}
</style>
</head>
<body>
<header>
  <div class="logo">QuakeSight <span>· event catalog</span></div>
  <div class="tabs">
    <button id="tabMap" class="on" onclick="setView('map')">Map</button>
    <button id="tabGlobe" onclick="setView('globe')">🌐 3D</button>
    <button id="tabTable" onclick="setView('table')">Table</button>
  </div>
  <div class="meta" id="meta">loading…</div>
</header>

<div id="body">
  <div id="map"></div>
  <div id="globe" class="hidden"></div>
  <aside id="aside">
    <div class="side-top">
      <input id="filter" placeholder="Filter by id, place, mechanism…"
             oninput="render()">
      <div class="legend">
        <b style="color:#1b252f;width:100%;margin-top:2px">Mechanism (beachball)</b>
        <span><i class="dot" style="background:#fbc02d"></i>Strike-slip</span>
        <span><i class="dot" style="background:#1976d2"></i>Normal</span>
        <span><i class="dot" style="background:#d32f2f"></i>Reverse</span>
        <span><i class="dot" style="background:#7b1fa2"></i>Oblique</span>
        <b style="color:#1b252f;width:100%;margin-top:5px">Status (dot · pill)</b>
        <span><i class="dot" style="background:#1a9850"></i>GREEN</span>
        <span><i class="dot" style="background:#e0a008"></i>YELLOW</span>
        <span><i class="dot" style="background:#d64545"></i>RED</span>
        <span><i class="dot" style="background:#f0820a"></i>Escalated</span>
        <span><i class="dot" style="background:#9aa5b1"></i>In progress</span>
      </div>
    </div>
    <div class="side-count" id="count"></div>
    <div id="list"></div>
  </aside>
  <div id="tablewrap" class="hidden"></div>
</div>

<script>
let CAT=null, MAP=null, MARKERS={}, SORT={key:'Mw',dir:-1}, SEL=null;

// Coloring policy (2026-05-25):
//   • Map marker: beachball whenever GBIS produced a focal mechanism (any
//     zone). Beachball color = faulting mechanism. No-GBIS events get a
//     neutral dot. mechColor() classifies by GBIS rake, else faulting_class.
//   • statusColor()/statusLabel() drive the sidebar/table status pill and
//     the no-GBIS dot, so users still see GREEN/YELLOW/RED quality.
function mechColor(e){
  let m=e.faulting_class||null;
  const r=e.result&&e.result.fmech&&e.result.fmech.rake;
  if(r!=null&&isFinite(r)){
    const a=Math.abs(r);
    if(a<=30||a>=150) m='strike-slip';
    else if(r>30&&r<150) m='reverse';
    else if(r<-30&&r>-150) m='normal';
    else m='oblique';
  }
  switch((m||'').toLowerCase()){
    case 'strike-slip': return '#fbc02d';
    case 'normal':      return '#1976d2';
    case 'reverse':
    case 'thrust':      return '#d32f2f';
    case 'oblique':     return '#7b1fa2';
    default:            return '#9aa5b1';
  }
}
function statusColor(e){
  if(e.stale) return '#d64545';
  const z=e.diagnostics&&e.diagnostics.zone;
  if(z==='GREEN') return '#1a9850';
  if(z==='YELLOW') return '#e0a008';
  if(z==='RED') return '#d64545';
  if(e.status==='escalated') return '#f0820a';
  if(e.status==='partial') return '#9aa5b1';
  return '#9aa5b1';
}
function statusLabel(e){
  const z=e.diagnostics&&e.diagnostics.zone;
  if(z==='GREEN') return 'Validated';
  if(z==='YELLOW') return 'Validated · caveats';
  if(z==='RED') return 'Model · low fit';
  if(e.status==='escalated') return 'No model';
  if(e.status==='partial') return 'In progress';
  return 'In progress';
}
function fmtTime(s){ return (s||'').replace('T',' ').replace(/:\d\d\.?\d*Z?$/,''); }

/* ---------- beachball (focal mechanism from InSAR strike/dip/rake) ---------- */
function _hexRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
// Lower-hemisphere equal-area beachball drawn by P-wave first-motion polarity
// (Aki & Richards): compressional quadrants filled with `fill`, dilatational
// white. strike/dip/rake in degrees (USGS convention). Returns a dataURL.
function beachballDataURL(strike,dip,rake,size,fill){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');const R=size/2,cx=R,cy=R,d2r=Math.PI/180;
  const ph=strike*d2r,dl=dip*d2r,lm=rake*d2r;
  // x=North, y=East, z=Down
  const n=[-Math.sin(dl)*Math.sin(ph), Math.sin(dl)*Math.cos(ph), -Math.cos(dl)];
  const s=[Math.cos(lm)*Math.cos(ph)+Math.cos(dl)*Math.sin(lm)*Math.sin(ph),
           Math.cos(lm)*Math.sin(ph)-Math.cos(dl)*Math.sin(lm)*Math.cos(ph),
           -Math.sin(lm)*Math.sin(dl)];
  const fc=_hexRgb(fill),img=ctx.createImageData(size,size);
  for(let py=0;py<size;py++)for(let px=0;px<size;px++){
    const dx=px-cx,dy=py-cy,rho=Math.hypot(dx,dy),idx=(py*size+px)*4;
    if(rho>R-0.5){img.data[idx+3]=0;continue;}
    const ih=2*Math.asin(Math.min(1,rho/(R*Math.SQRT2)));   // takeoff from vertical
    const az=Math.atan2(dx,-dy);                            // clockwise from North(up)
    const r=[Math.sin(ih)*Math.cos(az),Math.sin(ih)*Math.sin(az),Math.cos(ih)];
    const pol=(r[0]*n[0]+r[1]*n[1]+r[2]*n[2])*(r[0]*s[0]+r[1]*s[1]+r[2]*s[2]);
    const col=pol>=0?fc:[255,255,255];
    img.data[idx]=col[0];img.data[idx+1]=col[1];img.data[idx+2]=col[2];img.data[idx+3]=255;
  }
  ctx.putImageData(img,0,0);
  ctx.beginPath();ctx.arc(cx,cy,R-0.6,0,2*Math.PI);ctx.strokeStyle='#1b2733';ctx.lineWidth=1.1;ctx.stroke();
  return c.toDataURL();
}

/* ---------- map ---------- */
function buildMap(){
  MAP=L.map('map',{zoomControl:true}).setView([25,5],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:13})
    .addTo(MAP);
  const pts=[];
  CAT.events.forEach(e=>{
    if(e.epi_lat==null||e.epi_lon==null) return;
    // Beachball whenever GBIS produced a focal mechanism (any zone — GREEN,
    // YELLOW, or RED). Color = faulting MECHANISM (mechColor), not the
    // quality zone — zone is shown in popup, sidebar pill, and table pill.
    // Events with no GBIS fmech (escalated / partial) → status-color dot.
    const fm=e.result&&e.result.fmech;
    const hasFm=fm&&isFinite(fm.strike)&&isFinite(fm.dip)&&isFinite(fm.rake);
    let m;
    if(hasFm){
      const sz=Math.round(18+Math.max(0,(e.Mw||4)-4)*7);
      m=L.marker([e.epi_lat,e.epi_lon],{icon:L.icon({
        iconUrl:beachballDataURL(fm.strike,fm.dip,fm.rake,sz,mechColor(e)),
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]})}).addTo(MAP);
    }else{
      m=L.circleMarker([e.epi_lat,e.epi_lon],{
        radius:4+Math.max(0,(e.Mw||4)-4)*3.4,
        color:'#2b3640',weight:1,fillColor:statusColor(e),fillOpacity:.85
      }).addTo(MAP);
    }
    m.bindPopup(popupHtml(e),{maxWidth:265});
    m.on('click',()=>selectEvent(e.event_id,false));
    MARKERS[e.event_id]=m;
    pts.push([e.epi_lat,e.epi_lon]);
  });
  if(pts.length) MAP.fitBounds(pts,{padding:[50,50],maxZoom:6});
}
function popupHtml(e){
  const t=fmtTime(e.origin_utc);
  let h='<div class="pop">';
  h+=`<span class="eid">${e.event_id}</span><br>`;
  h+=`M ${e.Mw}`;
  if(e.faulting_class) h+=` · ${e.faulting_class}`;
  h+='<br>';
  h+=`<span class="place">${e.place||''}</span><br>`;
  if(t) h+=`<span class="time">${t} UTC</span>`;
  h+='<hr>';
  h+=`<span class="st" style="color:${statusColor(e)}">${statusLabel(e)}</span>`;
  if(e.stacking){
    h+=` <span style="color:#2a9d4a;font-weight:600" title="multi-pair stacked InSAR observation (vs single-pair)">⊞ stacked</span>`;
  }
  if(e.in_sequence){
    const n=e.sequence_n_significant||0;
    h+=` <span style="color:#2a76d2;font-weight:600" title="${n} other InSAR-observable events (Mw ≥ 5.5 or within 0.3 of target) within ±30d ±50km">🔗 sequence (${n})</span>`;
  }
  if(e.diagnostics&&e.diagnostics.catalog_disagreement){
    h+=` <span style="color:#d138ab;font-weight:600">⚠ USGS Δ</span>`;
  }
  if(e.diagnostics&&e.diagnostics.flags&&e.diagnostics.flags.includes('bad_track_contaminates')){
    const drops=(e.diagnostics.flags||[]).filter(f=>f.startsWith('drop_candidate:')).map(f=>f.split(':')[1]);
    h+=` <span style="color:#c47800;font-weight:600" title="One or more tracks have very low VR; suggest drop+retry: ${drops.join(', ')}">🪓 bad track</span>`;
  }
  if(e.diagnostics&&e.diagnostics.flags&&e.diagnostics.flags.includes('normal_fault_dual_plane_ambiguous')){
    h+=` <span style="color:#7d3c98;font-weight:600" title="Normal fault: both NP1 and NP2 fit the data — needs dual-plane review">⚖ dual-NP</span>`;
  }
  h+='<br>';
  if(e.status==='escalated'&&e.escalation_reason)
    h+=`<span class="esc">stopped: ${e.escalation_reason}</span><br>`;
  if(e.stale) h+='<span class="stale">⚠ predates critical fix — re-run</span><br>';
  if(e.links&&e.links.report)
    h+=`<a href="${e.links.report}" target="_blank">Open full report →</a>`;
  return h+'</div>';
}

/* ---------- selection sync ---------- */
function selectEvent(id, fromList){
  SEL=id;
  Object.entries(MARKERS).forEach(([k,m])=>{
    const e=CAT.events.find(x=>x.event_id===k);
    if(m.setStyle)m.setStyle({weight:k===id?3:1,color:k===id?'#1b4b73':'#2b3640'});
    else if(k===id)m.setZIndexOffset(1000);else m.setZIndexOffset(0);
    if(k===id) m.bringToFront();
  });
  document.querySelectorAll('.item').forEach(el=>
    el.classList.toggle('sel',el.dataset.id===id));
  const m=MARKERS[id];
  if(m){
    if(fromList){ MAP.flyTo(m.getLatLng(),Math.max(MAP.getZoom(),5),{duration:.6}); }
    m.openPopup();
  }
  if(fromList) return;
  const li=document.querySelector(`.item[data-id="${id}"]`);
  if(li) li.scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ---------- list ---------- */
function filtered(){
  const q=(document.getElementById('filter').value||'').toLowerCase();
  let rows=CAT.events.slice();
  if(q) rows=rows.filter(e=>(e.event_id+' '+(e.place||'')+' '
      +(e.faulting_class||'')+' '+statusLabel(e)+(e.stacking?' stacking stack':'')+(e.multievent?' multievent multi-event sequence '+e.multievent:'')).toLowerCase().includes(q));
  return rows;
}
function renderList(){
  // sidebar sorted by origin time, most recent first
  const rows=filtered().sort((a,b)=>
    (b.origin_utc||'').localeCompare(a.origin_utc||''));
  document.getElementById('count').textContent=
    `${rows.length} event${rows.length!==1?'s':''} shown`;
  const list=document.getElementById('list');
  list.innerHTML='';
  rows.forEach(e=>{
    const d=document.createElement('div');
    d.className='item'+(e.event_id===SEL?' sel':'');
    d.dataset.id=e.event_id;
    const col=statusColor(e);
    d.innerHTML=
      `<div class="badge" style="background:${col}">`
      +`<div class="m">${e.Mw??'?'}</div><div class="ml">Mw</div></div>`
      +`<div class="it-main">`
      +`<div class="it-place">${e.place||e.event_id}</div>`
      +`<div class="it-sub">${e.event_id} · ${e.faulting_class||'—'}${e.stacking?' · <span style="color:#2a9d4a;font-weight:600">⊞ stack</span>':''}${e.multievent==='severe'?` · <span style="color:#d9534f;font-weight:700" title="severe multievent: comparable/larger neighbour within stacking window — single-fault model unreliable">⚠ multi-event</span>`:''}</div>`
      +`<div class="it-sub">${fmtTime(e.origin_utc)||''} UTC</div>`
      +`<div class="it-status" style="color:${col}">`
      +`<i class="dot" style="background:${col}"></i>${statusLabel(e)}`
      +(e.stale?'<span class="stale">· re-run</span>':'')+`</div>`
      +`</div>`;
    d.onclick=()=>selectEvent(e.event_id,true);
    d.onmouseenter=()=>{const m=MARKERS[e.event_id];
      if(m&&m.setStyle&&e.event_id!==SEL) m.setStyle({weight:2.5,color:'#1b4b73'});};
    d.onmouseleave=()=>{const m=MARKERS[e.event_id];
      if(m&&m.setStyle&&e.event_id!==SEL) m.setStyle({weight:1,color:'#2b3640'});};
    list.appendChild(d);
  });
}

/* ---------- table ---------- */
// helpers to read GBIS detail fields safely
function _fm(e,k){return e.result&&e.result.fmech&&e.result.fmech[k];}
function _vrMin(e){const v=(e.diagnostics||{}).raw;return v?v.vr_min:null;}
function _vrMean(e){const v=(e.diagnostics||{}).raw;return v?v.vr_mean:null;}
function _mwPost(e){return e.result&&e.result.Mw_post;}
function _nTr(e){const v=(e.diagnostics||{}).raw;return v?v.n_tracks_in_gbis:null;}
function _zone(e){return (e.diagnostics||{}).zone||null;}
function _dMw(e){const mp=_mwPost(e);if(mp==null||e.Mw==null)return null;return +(mp-e.Mw).toFixed(2);}
function _seqN(e){return e.in_sequence?(e.sequence_n_significant||1):0;}
function _f1(v,n){if(v==null||!isFinite(v))return '—';return Number(v).toFixed(n);}
function _zonePill(z){
  if(!z) return '—';
  const c={GREEN:'#1a9850',YELLOW:'#e0a008',RED:'#d64545'}[z]||'#9aa5b1';
  return `<span class="pill" style="background:${c}">${z}</span>`;
}
function renderTable(){
  const cols=[
    ['event_id','event'],['Mw','Mw'],['_mwPost','Mw_post'],['_dMw','ΔMw'],
    ['depth_km','dep km'],
    ['_vrMin','vr_min'],['_vrMean','vr_mean'],['_nTr','n_tr'],
    ['_seqN','obs⊇seq'],
    ['stacking','stack'],
    ['multievent','multi-evt'],
    ['origin_utc','origin (UTC)'],['place','place']
  ];
  const getVal=(e,k)=>{
    switch(k){
      case '_mwPost': return _mwPost(e);
      case '_dMw':    return _dMw(e);
      case '_strike': return _fm(e,'strike');
      case '_dip':    return _fm(e,'dip');
      case '_rake':   return _fm(e,'rake');
      case '_vrMin':  return _vrMin(e);
      case '_vrMean': return _vrMean(e);
      case '_nTr':    return _nTr(e);
      case '_seqN':   return _seqN(e);
      case '_zone':   return _zone(e);
      default:        return e[k];
    }
  };
  let rows=filtered();
  const k=SORT.key;
  rows.sort((a,b)=>{
    let va=getVal(a,k),vb=getVal(b,k);
    if(va==null)va=(typeof vb==='number')?-1e9:'';
    if(vb==null)vb=(typeof va==='number')?-1e9:'';
    return (va<vb?-1:va>vb?1:0)*SORT.dir;
  });
  // tooltips for any column whose meaning isn't self-evident
  const COL_TIPS={
    '_dMw':'Mw_post − Mw_USGS; |Δ|≥0.3 highlighted',
    '_vrMin':'min per-track variance reduction',
    '_vrMean':'mean per-track variance reduction',
    '_nTr':'tracks actually used inside GBIS (after internal cull)',
    '_seqN':'InSAR co-seismic observation captures the target event PLUS '+
            'N additional events within the same SAR window '+
            '(±30d, ±50km, Mw≥5.5 or within 0.3 of target). '+
            'When N>0 the recovered model is a sum of multiple sources — '+
            'interpret strike/Mw_post with care.',
    '_zone':'quality zone: GREEN/YELLOW pass, RED low-fit',
  };
  let h='<table><thead><tr>';
  cols.forEach(c=>{
    const tip=COL_TIPS[c[0]]?` title="${COL_TIPS[c[0]]}"`:'';
    h+=`<th${tip} onclick="sortBy('${c[0]}')">${c[1]}</th>`;
  });
  h+='<th>report</th></tr></thead><tbody>';
  rows.forEach(e=>{
    h+='<tr>';
    h+=`<td><b>${e.event_id}</b></td>`;
    h+=`<td>${e.Mw??''}</td>`;
    h+=`<td>${_f1(_mwPost(e),2)}</td>`;
    const dmw=_dMw(e);
    h+=`<td style="color:${dmw!=null&&Math.abs(dmw)>=0.3?'#c47800':'inherit'}">${dmw!=null?(dmw>0?'+'+dmw:dmw):'—'}</td>`;
    h+=`<td>${e.depth_km??''}</td>`;
    h+=`<td>${_f1(_vrMin(e),2)}</td>`;
    h+=`<td>${_f1(_vrMean(e),2)}</td>`;
    h+=`<td>${_nTr(e)??'—'}</td>`;
    // obs⊇seq column: shows "+N" with explicit tooltip when InSAR captures
    // the target plus N other significant events; "single" otherwise
    const seqN=_seqN(e);
    if(seqN>0){
      h+=`<td title="InSAR observation = target + ${seqN} other significant event(s) in window" `
        +`style="color:#2a76d2;font-weight:600">🔗 +${seqN}</td>`;
    } else {
      h+=`<td title="single-event observation (no other significant EQ in SAR window)" `
        +`style="color:#5c6b7a">single</td>`;
    }
    h+=`<td style="text-align:center" title="${e.stacking?'multi-pair stacked observation':'single-pair'}">${e.stacking?'<span style="color:#2a9d4a;font-weight:700">⊞ stack</span>':'<span style="color:#aaa">—</span>'}</td>`;
    h+=`<td style="text-align:center" title="${e.multievent?`${e.multievent} multievent: ${e.multievent_n} neighbour(s), max Mw ${e.multievent_max_mw} (${e.multievent_sep})`:'single event'}">${e.multievent==='severe'?'<span style="color:#d9534f;font-weight:700">⚠ multi</span>':(e.multievent?'<span style="color:#c47800">minor</span>':'<span style="color:#aaa">—</span>')}</td>`;
    h+=`<td>${fmtTime(e.origin_utc)}</td>`;
    h+=`<td>${e.place||''}</td>`;
    h+=e.links&&e.links.report
      ?`<td><a href="${e.links.report}" target="_blank">report →</a></td>`
      :'<td>—</td>';
    h+='</tr>';
  });
  document.getElementById('tablewrap').innerHTML=h+'</tbody></table>';
}
function sortBy(k){ SORT.dir=(SORT.key===k)?-SORT.dir:1; SORT.key=k; renderTable(); }

function render(){ renderList(); renderTable(); }
function setView(v){
  document.getElementById('map').classList.toggle('hidden',v!=='map');
  document.getElementById('aside').classList.toggle('hidden',v!=='map');
  document.getElementById('tablewrap').classList.toggle('hidden',v!=='table');
  document.getElementById('globe').classList.toggle('hidden',v!=='globe');
  document.getElementById('tabMap').classList.toggle('on',v==='map');
  document.getElementById('tabTable').classList.toggle('on',v==='table');
  document.getElementById('tabGlobe').classList.toggle('on',v==='globe');
  if(v==='map'&&MAP) setTimeout(()=>MAP.invalidateSize(),60);
  if(v==='globe') buildGlobe();
}

// ---- Cesium 3D globe (built lazily on first activation) ----
let VIEWER=null;
function buildGlobe(){
  if(VIEWER||!CAT) return;
  // Cesium Ion token (registered account — enables World Terrain + Bing imagery)
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlNzQ5YjU2NC01YzYwLTQzMWQtOTFjOS1iNDUxOTVjMmZlZTEiLCJpZCI6NDQyMzQ1LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODEwMjkxMjB9.J2BlF1v6XNEJMC2CFl7UgNeDh1jGplzKOY6IZQRpRY8';
  // Cesium World Terrain + default Bing imagery (Ion token enables both)
  VIEWER = new Cesium.Viewer('globe', {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    baseLayerPicker: true,
    timeline: true, animation: true,
    geocoder: true,
    homeButton: true, sceneModePicker: true,
    navigationHelpButton: false, fullscreenButton: true,
    selectionIndicator: true, infoBox: true,
  });
  VIEWER.scene.globe.enableLighting = false;

  const times = CAT.events.map(e=>Date.parse(e.origin_utc)).filter(t=>!isNaN(t)).sort();
  if(times.length){
    const tMin = new Date(times[0]), tMax = new Date(times[times.length-1]);
    VIEWER.clock.startTime = Cesium.JulianDate.fromDate(tMin);
    VIEWER.clock.stopTime = Cesium.JulianDate.fromDate(tMax);
    VIEWER.clock.currentTime = VIEWER.clock.stopTime.clone();
    VIEWER.clock.clockRange = Cesium.ClockRange.LOOP_STOP;
    VIEWER.clock.multiplier = 86400*30; // 30 days/sec when playing
    VIEWER.timeline.zoomTo(VIEWER.clock.startTime, VIEWER.clock.stopTime);
  }

  const zoneColor = z =>
    z==='GREEN'  ? Cesium.Color.fromCssColorString('#28a745') :
    z==='YELLOW' ? Cesium.Color.fromCssColorString('#e8b400') :
    z==='RED'    ? Cesium.Color.fromCssColorString('#dc3545') :
                   Cesium.Color.fromCssColorString('#7d8a99');

  CAT.events.forEach(e=>{
    const lat=e.epi_lat, lon=e.epi_lon;
    if(lat==null||lon==null) return;
    const z=(e.diagnostics||{}).zone;
    const mw=e.Mw||5;
    const size=Math.max(8, Math.min(28, (mw-3)*5));
    const t=Date.parse(e.origin_utc);
    const props={
      id: e.event_id,
      // Float marker 8 km above ground so it sits on top of nearby mountains
      // without disabling depth test (which would make back-of-globe markers
      // show through, looking like a transparent globe).
      position: Cesium.Cartesian3.fromDegrees(lon, lat, 8000),
      point:{
        pixelSize: size,
        color: zoneColor(z),
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 1.5,
        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
        // Scale by distance so far-away markers shrink slightly (less clutter)
        scaleByDistance: new Cesium.NearFarScalar(1.5e5, 1.0, 3e7, 0.55),
      },
      description: `
        <table style="font-size:13px">
        <tr><td><b>Event</b></td><td>${e.event_id}</td></tr>
        <tr><td><b>Place</b></td><td>${e.place||''}</td></tr>
        <tr><td><b>Time</b></td><td>${e.origin_utc||''}</td></tr>
        <tr><td><b>Mw</b></td><td>${mw}</td></tr>
        <tr><td><b>Depth</b></td><td>${e.depth_km||'?'} km</td></tr>
        <tr><td><b>Zone</b></td><td>${z||'NONE'}</td></tr>
        <tr><td><b>Mechanism</b></td><td>${e.faulting_class||''}</td></tr>
        </table>
        <p><a href="events/${e.event_id}/REPORT.html" target="_blank"
              style="color:#1b4b73;font-weight:600">Open full REPORT →</a></p>`,
    };
    if(!isNaN(t)){
      // Only appear after origin time (lets timeline scrub through history)
      props.availability = new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({
        start: Cesium.JulianDate.fromDate(new Date(t)),
        stop: VIEWER.clock.stopTime,
      })]);
    }
    VIEWER.entities.add(props);
  });

  // Default home view = whole globe
  VIEWER.camera.flyHome(0);
}

fetch('catalog.json').then(r=>r.json()).then(c=>{
  CAT=c;
  const ns=c.events.filter(e=>e.stale).length;
  document.getElementById('meta').textContent=
    `${c.n_events} events · ${ns} stale · updated ${fmtTime(c.generated_utc)} UTC`;
  buildMap();
  render();
}).catch(err=>{
  document.getElementById('meta').textContent='failed to load catalog.json: '+err;
});
